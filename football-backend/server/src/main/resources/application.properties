# Application Settings
spring.application.name=server
server.port=8085
server.tomcat.basedir=${user.home}/football_project

# Velocity Template Settings
spring.velocity.suffix=.vm
spring.velocity.cache=false

# File Upload Constraints
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Profiles and Custom AOP Logging
spring.profiles.active=production
aspects.logging.enabled=true

# Resource Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Custom Error Routing Configuration
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# Database Connection Configuration (H2 File-Based Persistence)
spring.datasource.url=jdbc:h2:file:./data/football_db;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate / JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console Access
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration